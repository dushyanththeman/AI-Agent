{% extends "base.html" %}

{% block title %}Login · DecaworkIT{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-sm">
        <div class="card-body">
          <h1 class="h4 mb-3">Admin login</h1>
          <p class="text-muted small mb-4">Use <code>admin</code> / <code>admin123</code>.</p>
          <form method="post" action="{{ url_for('admin_login_post') }}">
            <div class="mb-3">
              <label class="form-label" for="username">Username</label>
              <input class="form-control" id="username" name="username" autocomplete="username" />
            </div>
            <div class="mb-3">
              <label class="form-label" for="password">Password</label>
              <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" />
            </div>
            <button class="btn btn-primary w-100" type="submit">Sign in</button>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
