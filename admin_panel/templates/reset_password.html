{% extends "base.html" %}

{% block title %}Reset password · DecaworkIT{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card">
        <div class="card-body">
          <h1 class="h4 mb-3">Reset password</h1>
          <p class="text-muted small">This is a mock flow. Submitting will log an audit entry and flash a success message.</p>
          <form method="post" action="{{ url_for('admin_reset_password_post') }}">
            <div class="mb-3">
              <label class="form-label" for="email">User email</label>
              <input class="form-control" id="email" name="email" placeholder="john@company.com" />
            </div>
            <button class="btn btn-primary w-100" type="submit">Send reset link</button>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
